

services:
  # --- BACKEND (Laravel 12) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobpulse-backend-1
    volumes:
      - ./backend:/var/www
    # FIX: Link your actual env file so the container inherently knows all credentials
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  # --- LARAVEL QUEUE WORKER ---
  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobpulse-queue-worker-1
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - ./backend:/var/www
    # FIX: Workers need the database credentials too!
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - backend
      - redis
    networks:
      - app-network

  # --- FRONTEND (React + TS + Tailwind) ---
  frontend:
    build:
      context: ./frontend
    container_name: jobpulse-frontend-1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # FIX: Vite defaults to 5173. Your previous log confirmed Vite is running on 5173!
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
      - CHOKIDAR_USECHIKIDAR=true # Forces hot-reloading to work perfectly inside Docker
    networks:
      - app-network

  # --- SCRAPERS (Python + Playwright + BS4) ---
  scrapers:
    build:
      context: ./scrapers
    container_name: jobpulse-scrapers-1
    volumes:
      - ./scrapers:/app
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/dbname
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  # --- REVERSE PROXY (Nginx) ---
  nginx:
    image: nginx:alpine
    container_name: jobpulse-nginx-1
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

  # --- DATABASE (PostgreSQL) ---
  postgres:
    image: postgres:16-alpine
    container_name: jobpulse-postgres-1
    environment:
      POSTGRES_DB: dbname
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  # --- CACHE & QUEUE (Redis) ---
  redis:
    image: redis:alpine
    container_name: jobpulse-redis-1
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  redisdata: